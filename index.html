<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Knowledge Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #00e5a0;
    --accent2: #ff4d4d;
    --accent3: #ffd700;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --correct: #00e5a0;
    --wrong: #ff4d4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 20% -10%, rgba(0,229,160,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 80% 110%, rgba(255,77,77,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* FIELD LINES */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent calc(10% - 1px),
      rgba(255,255,255,0.015) calc(10% - 1px),
      rgba(255,255,255,0.015) 10%
    );
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 16px 60px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: none; } }
  @keyframes pop { 0% { transform: scale(0.94); } 60% { transform: scale(1.03); } 100% { transform: scale(1); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), #00c4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .logo span {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #00c4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 2px;
  }
  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    min-width: 70px;
  }
  .streak-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--accent3);
    line-height: 1;
  }
  .streak-label {
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 2px;
  }

  /* DATE BAR */
  .datebar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .datebar::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent);
  }

  /* PROGRESS */
  .progress-bar-wrap {
    margin-bottom: 28px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00c4ff);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(0,229,160,0.5);
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #00c4ff, transparent);
  }
  .q-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text);
  }
  .clue-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .chip.highlight {
    border-color: rgba(0,229,160,0.3);
    color: var(--accent);
    background: rgba(0,229,160,0.07);
  }

  /* TEXT INPUT ANSWER */
  .answer-area {
    margin-bottom: 12px;
  }
  .answer-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .answer-input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    caret-color: var(--accent);
  }
  .answer-input::placeholder { color: var(--muted); font-weight: 400; }
  .answer-input:focus {
    border-color: rgba(0,229,160,0.5);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
  }
  .answer-input.correct {
    border-color: var(--correct);
    background: rgba(0,229,160,0.07);
    animation: pop 0.3s ease;
  }
  .answer-input.wrong {
    border-color: var(--wrong);
    background: rgba(255,77,77,0.06);
    animation: shake 0.3s ease;
  }
  .answer-input:disabled { cursor: default; }

  .submit-btn {
    flex-shrink: 0;
    padding: 18px 22px;
    background: linear-gradient(135deg, var(--accent), #00c4ff);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: #000;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; }

  .hint-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    min-height: 22px;
  }
  .hint-text {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
  }
  .skip-link {
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-decoration: underline;
    text-underline-offset: 2px;
    opacity: 0.7;
    transition: opacity 0.15s;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .skip-link:hover { opacity: 1; }

  /* FEEDBACK */
  .feedback-bar {
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 14px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct-fb {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
  }
  .feedback-bar.wrong-fb {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.3);
    color: var(--wrong);
  }

  /* NEXT BUTTON */
  .next-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #00c4ff);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    color: #000;
    cursor: pointer;
    display: none;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* RESULTS */
  .results-screen { animation: fadeIn 0.5s ease; }
  .results-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .results-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent3), var(--accent), #00c4ff);
  }
  .tier-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 1;
    margin: 16px 0;
  }
  .score-display .denom {
    font-size: 2.2rem;
    color: var(--muted);
  }
  .score-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin: 12px 0;
  }
  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }
  .dot.hit { background: var(--correct); box-shadow: 0 0 6px var(--correct); }
  .dot.miss { background: var(--surface2); border: 1.5px solid var(--border); }

  .share-btn {
    width: 100%;
    padding: 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 16px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .share-btn:hover { border-color: var(--accent); color: var(--accent); }
  .share-btn.copied { border-color: var(--accent); color: var(--accent); }

  /* REVIEW */
  .review-section { margin-top: 24px; }
  .review-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .review-item.was-correct { border-left: 3px solid var(--correct); }
  .review-item.was-wrong { border-left: 3px solid var(--wrong); }
  .review-q { font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .review-ans {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
  }
  .review-ans span.correct-ans { color: var(--correct); font-weight: 700; }
  .review-ans span.your-ans { color: var(--wrong); }

  /* START SCREEN */
  .start-screen {
    text-align: center;
    padding: 40px 0;
  }
  .start-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .start-screen p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
    max-width: 380px;
    margin: 0 auto 28px;
  }
  .start-btn {
    display: inline-block;
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent), #00c4ff);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 4px;
    color: #000;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 16px;
  }
  .start-btn:hover { opacity: 0.9; transform: translateY(-2px); }
  .already-done {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-top: 20px;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .already-done strong { color: var(--accent3); }


  .difficulty-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .difficulty-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
  }
  .difficulty-badge.easy { color: var(--accent); border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.08); }
  .difficulty-badge.medium { color: #00c4ff; border-color: rgba(0,196,255,0.25); background: rgba(0,196,255,0.08); }
  .difficulty-badge.hard { color: var(--accent3); border-color: rgba(255,215,0,0.25); background: rgba(255,215,0,0.08); }
  .points-badge {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 88px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: none;
    z-index: 8;
    box-shadow: 0 12px 32px rgba(0,0,0,0.28);
  }
  .autocomplete-list.show { display: block; }
  .suggestion-item {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover,
  .suggestion-item.active {
    background: rgba(0,229,160,0.08);
    color: var(--accent);
  }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 18px;
  }
  .score-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
  }
  .score-card-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 4px;
  }
  .score-card-label {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .mix-note {
    margin-top: 18px;
    font-size: 0.76rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .review-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .review-pill {
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .review-pill.easy { color: var(--accent); }
  .review-pill.medium { color: #00c4ff; }
  .review-pill.hard { color: var(--accent3); }
  @media (max-width: 640px) {
    .autocomplete-list { right: 0; }
    .score-grid { grid-template-columns: 1fr; }
    .difficulty-row { align-items: flex-start; flex-direction: column; }
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .loading::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots { 0%,20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%,100% { content: '...'; } }
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="loading">Loading roster</div>
</div>

// Deduplicate by name — one canonical entry per player
function dedupeRoster(list) {
  const seen = new Set();
  const out = [];
  for (const p of list || []) {
    if (!p || !p.name || seen.has(p.name)) continue;
    seen.add(p.name);
    out.push(p);
  }
  return out;
}

let PLAYERS = dedupeRoster(ROSTER);
let rosterUpdatedAt = null;

function isUnique(predicate) {
  return PLAYERS.filter(predicate).length === 1;
}

function seededRNG(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function dateSeed(str) {
  let h = 5381;
  for(let i=0;i<str.length;i++) h = ((h*33)^str.charCodeAt(i))&0xFFFFFFFF;
  return (h>>>0);
}

function shuffle(arr, rng) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--) {
    const j = Math.floor(rng()*( i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function titleCaseDifficulty(diff) {
  return diff.charAt(0).toUpperCase() + diff.slice(1);
}

function getDifficultyMeta(diff) {
  if(diff === 'easy') return {label:'Easy', points:1};
  if(diff === 'hard') return {label:'Hard', points:3};
  return {label:'Medium', points:2};
}

const QUIZ_MIX = { easy: 2, medium: 5, hard: 3 };
const MAX_SCORE = QUIZ_MIX.easy * 1 + QUIZ_MIX.medium * 2 + QUIZ_MIX.hard * 3;

function getDistractors(correct, rng) {
  let pool = PLAYERS.filter(p => p.name !== correct.name && p.position === correct.position);
  const sameDivision = pool.filter(p => p.division === correct.division);
  const sameConference = pool.filter(p => p.division !== correct.division && p.conference === correct.conference);
  const others = pool.filter(p => p.conference !== correct.conference);
  const combined = [...shuffle(sameDivision, rng), ...shuffle(sameConference, rng), ...shuffle(others, rng)];
  const chosen = [];
  for (const p of combined) {
    if (chosen.length >= 3) break;
    if (!chosen.includes(p.name)) chosen.push(p.name);
  }
  if (chosen.length < 3) {
    const any = shuffle(PLAYERS.filter(p => p.name !== correct.name && !chosen.includes(p.name)), rng);
    while (chosen.length < 3 && any.length) chosen.push(any.shift().name);
  }
  return shuffle(chosen, rng);
}

function makeQuestion(p, rng, difficulty, text, chips) {
  const meta = getDifficultyMeta(difficulty);
  return {
    text,
    chips,
    answer: p.name,
    difficulty,
    points: meta.points,
    distractors: getDistractors(p, rng),
  };
}

function generateDailyQuiz(dateStr) {
  const seed = dateSeed(`${dateStr}|${rosterUpdatedAt || 'fallback'}`);
  const rng = seededRNG(seed);
  const shuffledPlayers = shuffle(PLAYERS, rng);
  const shuffledTemplates = shuffle(TEMPLATES, rng);
  const buckets = { easy: [], medium: [], hard: [] };
  const usedTexts = new Set();
  const usedPlayers = new Set();

  for (const template of shuffledTemplates) {
    for (const player of shuffledPlayers) {
      if (usedPlayers.has(`${template.difficulty}:${player.name}`)) continue;
      const q = template.build(player, rng);
      if (!q) continue;
      if (usedTexts.has(q.text)) continue;
      buckets[q.difficulty].push(q);
      usedTexts.add(q.text);
      usedPlayers.add(`${template.difficulty}:${player.name}`);
    }
  }

  const selected = [];
  ['easy','medium','hard'].forEach(diff => {
    const needed = QUIZ_MIX[diff];
    const pool = shuffle(buckets[diff], rng);
    const takenNames = new Set(selected.map(q => q.answer));
    for (const q of pool) {
      if (selected.filter(x => x.difficulty === diff).length >= needed) break;
      if (takenNames.has(q.answer)) continue;
      selected.push(q);
      takenNames.add(q.answer);
    }
  });

  if (selected.length < 10) {
    const fallback = shuffle([...buckets.easy, ...buckets.medium, ...buckets.hard], rng);
    const used = new Set(selected.map(q => q.text));
    for (const q of fallback) {
      if (selected.length >= 10) break;
      if (used.has(q.text)) continue;
      selected.push(q);
      used.add(q.text);
    }
  }

  return shuffle(selected.slice(0, 10), rng);
}

function updateStreak(todayStr) {
  const s = loadStreak();
  const yesterday = getPrevDateStr(todayStr);
  if(s.lastDate === todayStr) return s;
  if(s.lastDate === yesterday) { s.count++; } else { s.count = 1; }
  s.lastDate = todayStr;
  saveStreak(s);
  return s;
}

function getSuggestions(query) {
  const q = normalize(query);
  if (!q || q.length < 2) return [];
  const tokens = q.split(' ');
  return PLAYERS
    .map(p => p.name)
    .filter((name, idx, arr) => arr.indexOf(name) === idx)
    .filter(name => {
      const n = normalize(name);
      return n.includes(q) || tokens.every(t => n.includes(t));
    })
    .sort((a,b) => {
      const an = normalize(a), bn = normalize(b);
      const aStarts = an.startsWith(q) ? 0 : 1;
      const bStarts = bn.startsWith(q) ? 0 : 1;
      return aStarts - bStarts || a.localeCompare(b);
    })
    .slice(0, 5);
}

function handleInputKey(e) {
  if(e.key === 'Escape') {
    renderSuggestions([]);
    return;
  }
  if(e.key === 'Enter') {
    if(activeSuggestions.length && !answered) {
      e.preventDefault();
      chooseSuggestion(activeSuggestions[0]);
      return;
    }
    const inp = document.getElementById('answerInput');
    if(inp && inp.value.trim().length >= 2 && !answered) submitAnswer();
    else if(answered) nextQuestion();
  }
}

function normalize(str) {
  return str
    .toLowerCase()
    .replace(/jr\.?/g, 'jr')
    .replace(/sr\.?/g, 'sr')
    .replace(/ii|iii|iv/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function tokenize(str) {
  return normalize(str).split(' ').filter(Boolean);
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyTokenMatch(inputToken, nameToken) {
  if(inputToken === nameToken) return true;
  const maxDist = nameToken.length >= 5 ? 1 : 0;
  return levenshtein(inputToken, nameToken) <= maxDist;
}

function isNameMatch(input, fullName) {
  const inputTokens = tokenize(input);
  const nameTokens = tokenize(fullName);
  if(inputTokens.length === 0) return false;
  if(normalize(input) === normalize(fullName)) return true;
  if(inputTokens.length === 1) return nameTokens.some(nt => fuzzyTokenMatch(inputTokens[0], nt));
  const lastName = nameTokens[nameTokens.length - 1];
  let lastNameMatched = false;
  const allMatched = inputTokens.every(it => {
    const hit = nameTokens.find(nt => fuzzyTokenMatch(it, nt));
    if(hit === lastName) lastNameMatched = true;
    return !!hit;
  });
  return allMatched && lastNameMatched;
}

function submitAnswer() {
  if(answered) return;
  const inp = document.getElementById('answerInput');
  if(!inp || inp.value.trim().length < 2) return;
  answered = true;

  const q = quiz[currentQ];
  const typed = inp.value.trim();
  const correct = isNameMatch(typed, q.answer);
  if(correct) score += q.points;
  answers.push({question:q.text, chosen:typed, correct, correctAnswer:q.answer, difficulty:q.difficulty, points:q.points});

  inp.disabled = true;
  inp.classList.add(correct ? 'correct' : 'wrong');
  renderSuggestions([]);
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.disabled = true;
  const skipBtn = document.getElementById('skipBtn');
  if(skipBtn) skipBtn.style.display = 'none';

  const fb = document.getElementById('feedback');
  if(correct) {
    fb.className = 'feedback-bar correct-fb show';
    fb.innerHTML = `✅ ${titleCaseDifficulty(q.difficulty)} question — +${q.points} ${q.points===1?'point':'points'}!`;
  } else {
    fb.className = 'feedback-bar wrong-fb show';
    fb.innerHTML = `❌ The answer was <strong>${q.answer}</strong> — that one was worth ${q.points}`;
  }

  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.classList.add('show');
}

function skipQuestion() {
  if(answered) return;
  answered = true;
  const q = quiz[currentQ];
  answers.push({question:q.text, chosen:'–', correct:false, correctAnswer:q.answer, difficulty:q.difficulty, points:q.points});

  const inp = document.getElementById('answerInput');
  if(inp) { inp.disabled = true; inp.value = ''; inp.placeholder = 'Skipped'; }
  renderSuggestions([]);
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn) submitBtn.disabled = true;
  const skipBtn = document.getElementById('skipBtn');
  if(skipBtn) skipBtn.style.display = 'none';

  const fb = document.getElementById('feedback');
  fb.className = 'feedback-bar wrong-fb show';
  fb.innerHTML = `📋 The answer was <strong>${q.answer}</strong> — skipped ${q.points}-point ${q.difficulty} question`;

  const nextBtn = document.getElementById('nextBtn');
  if(nextBtn) nextBtn.classList.add('show');
}

function nextQuestion() {
  answered = false;
  currentQ++;
  if(currentQ >= 10) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

function finishQuiz() {
  streak = updateStreak(TODAY);
  saveState({ done:true, score, correct:getCorrectCount(), answers, rosterUpdatedAt });
  renderResults(false);
}

function reviewMode() {
  const s = loadState();
  if(!s) return;
  score = s.score || 0;
  answers = s.answers || [];
  renderResults(true);
}

function renderResults(review) {
  const tier = getTier(score);
  const dotsHtml = answers.map(a=>`<div class="dot ${a.correct?'hit':'miss'}"></div>`).join('');
  const reviewHtml = answers.map(a => `
    <div class="review-item ${a.correct ? 'was-correct' : 'was-wrong'}">
      <div class="review-q">${a.question}</div>
      <div class="review-meta">
        <span class="review-pill ${a.difficulty}">${titleCaseDifficulty(a.difficulty)}</span>
        <span class="review-pill">${a.points} pts</span>
      </div>
      <div class="review-ans">${a.correct ? `✅ <span class="correct-ans">${a.correctAnswer}</span>` : `You said: <span class="your-ans">${a.chosen || '–'}</span> → Correct: <span class="correct-ans">${a.correctAnswer}</span>`}</div>
    </div>
  `).join('');

  const shareText = buildShareText(score, answers);

  app.innerHTML = renderHeader() + `
    <div class="results-screen">
      <div class="results-hero">
        <div class="tier-label">Today's Result</div>
        <div class="results-title">${tier.emoji} ${tier.label}</div>
        <div class="score-display">${score}<span class="denom">/${MAX_SCORE}</span></div>
        <div class="score-grid">
          <div class="score-card">
            <div class="score-card-num">${getCorrectCount()}</div>
            <div class="score-card-label">Correct</div>
          </div>
          <div class="score-card">
            <div class="score-card-num">10</div>
            <div class="score-card-label">Questions</div>
          </div>
          <div class="score-card">
            <div class="score-card-num">${MAX_SCORE}</div>
            <div class="score-card-label">Max Points</div>
          </div>
        </div>
        <div class="score-dots">${dotsHtml}</div>
        <button class="share-btn" onclick="shareResult('${encodeURIComponent(shareText)}')" id="shareBtn">
          <span>📋</span> Copy Result
        </button>
      </div>
      <div class="review-section">
        <div class="review-title">Breakdown</div>
        ${reviewHtml}
      </div>
      <div style="text-align:center;margin-top:28px;">
        <div style="font-size:0.75rem;color:var(--muted);letter-spacing:2px;font-weight:600;text-transform:uppercase">
          New quiz drops at midnight 🏈
        </div>
      </div>
    </div>
  `;
}

function buildShareText(weightedScore, answers) {
  const dots = answers.map(a => a.correct ? '🟩' : '🟥').join('');
  return `Ball Knowledge Daily ${TODAY}
${answers.filter(a=>a.correct).length}/10 • ${weightedScore}/${MAX_SCORE} pts
${dots}

Can you beat my score?`;
}

function shareResult(encoded) {
  const text = decodeURIComponent(encoded);
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>{
      const btn = document.getElementById('shareBtn');
      if(btn){ btn.classList.add('copied'); btn.innerHTML='<span>✅</span> Copied!'; }
    });
  }
}

function startQuiz() {
  currentQ = 0;
  score = 0;
  answers = [];
  answered = false;
  quiz = generateDailyQuiz(TODAY);
  renderQuestion();
}

// Map 3-letter team abbreviation → full name + conference + division

  ARI:{team:"Arizona Cardinals",   conference:"NFC",division:"NFC West"},

};

// Convert a compact roster.json player object into the full format the game expects
function expandPlayer(p) {
  // Support both full keys (embedded ROSTER) and short keys (roster.json)
  const abbr = p.t || p.team;
  const meta = TEAM_META[abbr] || {};
  return {
    name:       p.n    || p.name,
    position:   p.p    || p.position,
    number:     Number(p.j != null ? p.j : p.number),
    college:    p.c    || p.college,
    exp:        Number(p.e != null ? p.e : p.exp),
    height:     p.h    || p.height || 72,
    weight:     p.w    || p.weight || 220,
    team:       meta.team       || abbr,
    conference: meta.conference || p.conference || '',
    division:   meta.division   || p.division   || '',
  };
}

async function initApp() {
  // Register globals first so buttons always work regardless of async timing
  window.startQuiz    = startQuiz;
  window.submitAnswer = submitAnswer;
  window.nextQuestion = nextQuestion;
  window.skipQuestion = skipQuestion;
  window.reviewMode   = reviewMode;
  window.shareResult  = shareResult;
  window.chooseSuggestion = chooseSuggestion;

  try {
    const res = await fetch('./roster.json', { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      if (data && Array.isArray(data.players) && data.players.length) {
        // Expand short-key players and filter to skill positions only
        const expanded = data.players
          .map(expandPlayer)
          .filter(p => p.name && p.team && ['QB','RB','WR','TE'].includes(p.position));
        if (expanded.length > 20) {
          PLAYERS = dedupeRoster(expanded);
          rosterUpdatedAt = data.updated || null;
        }
      }
    }
  } catch (err) {
    console.warn('Using embedded roster fallback.', err);
  }

  quiz = generateDailyQuiz(TODAY);
  streak = loadStreak();
  savedState = loadState();
  renderStart();
}

initApp();
</script>
